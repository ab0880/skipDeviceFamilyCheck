name: Build All Schemes (rootful/rootless/roothide)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        scheme: [rootful, rootless, roothide]
        include:
          - scheme: rootful
            scheme_arg: ""
          - scheme: rootless
            scheme_arg: "THEOS_PACKAGE_SCHEME=rootless"
          - scheme: roothide
            scheme_arg: "THEOS_PACKAGE_SCHEME=roothide"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Theos
        uses: waruhachi/theos-action@v2.4.6
        with:
          theos-src: 'waruhachi/theos'
          theos-branch: 'main'
          sdks-src: 'waruhachi/sdks'
          sdks-branch: 'main'

      - name: Ensure iOS 16.5 SDK (fallback)
        run: |
          if [ ! -d "$THEOS/sdks/iPhoneOS16.5.sdk" ]; then
            echo "iOS 16.5 SDK not found, downloading..."
            mkdir -p $THEOS/sdks
            curl -L --fail -o /tmp/iPhoneOS16.5.sdk.tar.xz \
              https://raw.githubusercontent.com/theos/sdks/master/iPhoneOS16.5.sdk.tar.xz
            tar -xf /tmp/iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks
          else
            echo "iOS 16.5 SDK already present."
          fi
          ls -d $THEOS/sdks/iPhoneOS16.5.sdk

      - name: Build Package
        run: |
          make clean package ${{ matrix.scheme_arg }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scheme }}-package
          path: packages/*.deb
